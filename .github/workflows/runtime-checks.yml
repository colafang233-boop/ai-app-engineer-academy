name: Runtime checks

on:
  pull_request:
    paths:
      - 'packages/course-runtime/**'
      - 'courses/ai-app-engineering/**'
      - 'apps/runtime-preview/**'
      - 'apps/runtime-academy/**'
      - 'tools/**'
      - 'package.json'
      - 'wrangler.jsonc'
      - '.github/workflows/runtime-checks.yml'
  push:
    branches:
      - 'main'

jobs:
  runtime-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pinned development dependencies
        run: npm install --no-audit --no-fund

      - name: Check module syntax
        run: |
          find packages/course-runtime/src courses/ai-app-engineering apps/runtime-academy tools \
            -name '*.js' -o -name '*.mjs' | xargs -n1 node --check

      - name: Run runtime foundation tests
        run: node tools/test_course_runtime.mjs

      - name: Run complete base course configuration tests
        run: node tools/test_runtime_full.mjs

      - name: Check learner-facing product surface
        run: node tools/test_product_surface.mjs

      - name: Check persistent lesson navigation
        run: node tools/test_lesson_navigation.mjs

      - name: Check formal seven-column dashboard
        run: node tools/test_formal_dashboard.mjs

      - name: Check release defaults and course identity
        run: node tools/test_release_defaults.mjs

      - name: Check exam option-order integrity
        run: node tools/test_exam_integrity.mjs

      - name: Validate official LangChain v1 curriculum
        run: node tools/test_column03_official.mjs

      - name: Validate framework-neutral RAG curriculum
        run: node tools/test_column04_rag.mjs

      - name: Validate LangGraph v1 and Agentic RAG curriculum
        run: node tools/test_column05_langgraph.mjs

      - name: Validate MCP protocol and host-integration curriculum
        run: node tools/test_column06_mcp.mjs

      - name: Validate Enterprise AI Service Desk curriculum
        run: |
          node tools/test_column07_enterprise_foundations.mjs
          node tools/test_column07_enterprise.mjs

      - name: Build Cloudflare static assets
        run: npm run build

      - name: Verify Cloudflare output
        run: |
          test -f dist/index.html
          test -f dist/apps/runtime-academy/index.html
          test -f dist/apps/runtime-academy/enterprise.css
          test -f dist/apps/runtime-academy/lesson-navigation.css
          test -f dist/apps/runtime-academy/responsive-headings.css
          test -f dist/apps/runtime-academy/responsive-layout.css
          test -f dist/packages/course-runtime/src/exam-integrity.js
          test -f dist/packages/course-runtime/src/lesson-navigation.js
          test -f dist/packages/course-runtime/src/simulators-enterprise.js
          test -f dist/packages/course-runtime/src/enterprise-column-product.js
          test -f dist/courses/ai-app-engineering/column-07-enterprise-service-desk.js
          test -f dist/courses/ai-app-engineering/column-07-enterprise-fixtures.js

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run official LangChain v1 browser journey
        run: node tools/run_column03_official_browser.mjs

      - name: Run framework-neutral RAG browser journey
        run: node tools/run_column04_rag_browser.mjs

      - name: Run LangGraph v1 and Agentic RAG browser journey
        run: node tools/run_column05_langgraph_browser.mjs

      - name: Run MCP protocol and host-integration browser journey
        run: node tools/run_column06_mcp_browser.mjs

      - name: Run Enterprise AI Service Desk browser journey
        run: node tools/run_column07_enterprise_browser.mjs

      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: academy-browser-evidence
          path: artifacts/*
          if-no-files-found: ignore
