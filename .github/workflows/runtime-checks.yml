name: Runtime checks

on:
  pull_request:
    paths:
      - 'packages/course-runtime/**'
      - 'courses/ai-app-engineering/**'
      - 'apps/runtime-preview/**'
      - 'apps/runtime-academy/**'
      - 'tools/test_course_runtime.mjs'
      - 'tools/test_runtime_full.mjs'
      - 'tools/test_product_surface.mjs'
      - 'tools/test_formal_dashboard.mjs'
      - 'tools/test_column03.mjs'
      - 'tools/test_column03_browser.mjs'
      - '.github/workflows/runtime-checks.yml'
  push:
    branches:
      - 'agent/course-runtime-foundation'
      - 'agent/column-03-langchain-core'

jobs:
  runtime-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check module syntax
        run: |
          find packages/course-runtime/src courses/ai-app-engineering apps/runtime-academy \
            -name '*.js' -print0 | xargs -0 -n1 node --check

      - name: Run runtime foundation tests
        run: node tools/test_course_runtime.mjs

      - name: Run complete course configuration tests
        run: node tools/test_runtime_full.mjs

      - name: Check learner-facing product surface
        run: node tools/test_product_surface.mjs

      - name: Check formal seven-column dashboard
        run: node tools/test_formal_dashboard.mjs

      - name: Validate LangChain core column
        run: node tools/test_column03.mjs

      - name: Install browser test runtime
        run: |
          npm install --no-save playwright@1.54.1
          npx playwright install --with-deps chromium

      - name: Run LangChain column browser journey
        run: node tools/test_column03_browser.mjs

      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: column03-browser-evidence
          path: artifacts/*
          if-no-files-found: ignore
